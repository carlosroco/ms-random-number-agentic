name: Docs Subagent — Technical Documentation

# Skill: technical-documentation
# Handles sub-issues: [Docs]

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  docs-subagent:
    name: Docs Subagent - Technical Documentation
    runs-on: ubuntu-latest
    if: |
      github.event.label.name == 'sub-issue' &&
      startsWith(github.event.issue.title, '[Docs]')

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Generar documentación README
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const issue = context.payload.issue;
            const issueNumber = issue.number;
            const issueBody = issue.body || '';
            const { owner, repo } = context.repo;

            // ─── Asignar el issue a Copilot ──────────────────────────────────────────
            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number: issueNumber,
              assignees: ['Copilot'],
            });
            core.info(`Issue #${issueNumber} asignado a Copilot`);

            // ─── Leer contexto del issue padre desde el body ─────────────────────────
            // Busca la línea: "**Issue padre:** #N — título"
            const parentRefMatch = issueBody.match(/\*\*Issue padre:\*\* #(\d+) — (.+)/);
            const parentTitle = parentRefMatch ? parentRefMatch[2].trim() : null;

            // ─── Leer SKILL.md y extraer el cuerpo (sin frontmatter YAML) ────────────
            const skillContent = fs.readFileSync('./.github/skills/technical-documentation/SKILL.md', 'utf8');
            const bodyMatch = skillContent.match(/^---[\s\S]*?---\n([\s\S]*)$/);
            const skillBody = bodyMatch ? bodyMatch[1].trim() : skillContent;

            // ─── Skill: technical-documentation — Generar README.md ─────────────────
            const commentBody = [
              `## 📄 Docs Subagent — Technical Documentation`,
              ``,
              `**Skill:** \`technical-documentation\` | **Tarea:** \`[Docs]\``,
              ``,
              `He analizado el issue y genero la documentación del microservicio. 📝`,
              ``,
              parentTitle ? `> 📌 Issue padre: ${parentTitle}` : '',
              ``,
              `---`,
              ``,
              skillBody,
              ``,
              `> 🤖 Generado automáticamente por el **docs-subagent** con skill \`technical-documentation\``,
            ].join('\n');

            // ─── Publicar comentario con la documentación generada ───────────────────
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: commentBody,
            });
            core.info(`Comentario publicado en el issue #${issueNumber}`);

            // ─── Agregar label "in-progress" ─────────────────────────────────────────
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: ['in-progress'],
            });
            core.info(`Label "in-progress" agregado al issue #${issueNumber}`);
