name: Docs Subagent — Technical Documentation

# Skill: technical-documentation
# Handles sub-issues: [Docs]

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  docs-subagent:
    name: Docs Subagent - Technical Documentation
    runs-on: ubuntu-latest
    if: |
      github.event.label.name == 'sub-issue' &&
      startsWith(github.event.issue.title, '[Docs]')

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Generar documentación README
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const skill = require('./.github/skills/technical-documentation.skill.js');
            const issue = context.payload.issue;
            const issueNumber = issue.number;
            const issueTitle = issue.title;
            const issueBody = issue.body || '';
            const { owner, repo } = context.repo;

            // ─── Asignar el issue a Copilot ──────────────────────────────────────────
            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number: issueNumber,
              assignees: ['Copilot'],
            });
            core.info(`Issue #${issueNumber} asignado a Copilot`);

            // ─── Leer contexto del issue padre desde el body ─────────────────────────
            // Busca la línea: "**Issue padre:** #N — título"
            const parentRefMatch = issueBody.match(/\*\*Issue padre:\*\* #(\d+) — (.+)/);
            const parentNumber = parentRefMatch ? parentRefMatch[1] : 'N/A';
            const parentTitle = parentRefMatch ? parentRefMatch[2].trim() : 'Microservicio Random Number';

            // ─── Skill: technical-documentation — Generar README.md ─────────────────
            const parentRef = parentRefMatch
              ? { number: parentNumber, title: parentTitle }
              : null;
            const commentBody = skill.generateReadme(issueTitle, parentRef);

            // ─── Publicar comentario con la documentación generada ───────────────────
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: commentBody,
            });
            core.info(`Comentario publicado en el issue #${issueNumber}`);

            // ─── Agregar label "in-progress" ─────────────────────────────────────────
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: ['in-progress'],
            });
            core.info(`Label "in-progress" agregado al issue #${issueNumber}`);
