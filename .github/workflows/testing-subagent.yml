name: Testing Subagent — JUnit 5

# Skill: java-testing-junit5
# Handles sub-issues: [Tests]

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  testing-subagent:
    name: Testing Subagent - JUnit 5
    runs-on: ubuntu-latest
    if: |
      github.event.label.name == 'sub-issue' &&
      startsWith(github.event.issue.title, '[Tests]')

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Generar código de tests JUnit 5
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const skill = require('./.github/skills/java-testing-junit5.skill.js');

            const issue = context.payload.issue;
            const issueNumber = issue.number;
            const issueTitle = issue.title;
            const { owner, repo } = context.repo;

            // ─── Asignar el issue a Copilot ──────────────────────────────────────────
            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number: issueNumber,
              assignees: ['Copilot'],
            });
            core.info(`Issue #${issueNumber} asignado a Copilot`);

            // ─── Skill: java-testing-junit5 ──────────────────────────────────────────
            const commentBody = skill.generateTests(issueTitle);

            // ─── Publicar comentario con el código generado ──────────────────────────
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: commentBody,
            });
            core.info(`Comentario publicado en el issue #${issueNumber}`);

            // ─── Agregar label "in-progress" ─────────────────────────────────────────
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: ['in-progress'],
            });
            core.info(`Label "in-progress" agregado al issue #${issueNumber}`);
