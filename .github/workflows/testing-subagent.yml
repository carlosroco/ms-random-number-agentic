name: Testing Subagent — JUnit 5

# Skill: java-testing-junit5
# Handles sub-issues: [Tests]

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  testing-subagent:
    name: Testing Subagent - JUnit 5
    runs-on: ubuntu-latest
    if: |
      github.event.label.name == 'sub-issue' &&
      startsWith(github.event.issue.title, '[Tests]')

    steps:
      - name: Generar código de tests JUnit 5
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const issueNumber = issue.number;
            const { owner, repo } = context.repo;

            // ─── Asignar el issue a Copilot ──────────────────────────────────────────
            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number: issueNumber,
              assignees: ['Copilot'],
            });
            core.info(`Issue #${issueNumber} asignado a Copilot`);

            // ─── Skill: java-testing-junit5 ──────────────────────────────────────────
            const commentBody = [
              `## 🧪 Testing Subagent — JUnit 5`,
              ``,
              `**Skill:** \`java-testing-junit5\` | **Tarea:** \`[Tests]\``,
              ``,
              `He analizado el issue y genero los tests unitarios y de integración. ✅`,
              ``,
              `---`,
              ``,
              `### 📄 \`src/test/java/com/example/msrandomnumber/service/RandomNumberServiceTest.java\``,
              ``,
              '```java',
              `package com.example.msrandomnumber.service;`,
              ``,
              `import org.junit.jupiter.api.Test;`,
              `import org.junit.jupiter.api.extension.ExtendWith;`,
              `import org.mockito.junit.jupiter.MockitoExtension;`,
              ``,
              `import static org.junit.jupiter.api.Assertions.assertTrue;`,
              ``,
              `@ExtendWith(MockitoExtension.class)`,
              `class RandomNumberServiceTest {`,
              ``,
              `    private final RandomNumberService service = new RandomNumberServiceImpl();`,
              ``,
              `    @Test`,
              `    void getRandomNumber_shouldReturnValueBetween1And9() {`,
              `        for (int i = 0; i < 100; i++) {`,
              `            int result = service.getRandomNumber();`,
              `            assertTrue(result >= 1 && result <= 9,`,
              `                "El número debe estar entre 1 y 9 (inclusive), pero fue: " + result);`,
              `        }`,
              `    }`,
              `}`,
              '```',
              ``,
              `---`,
              ``,
              `### 📄 \`src/test/java/com/example/msrandomnumber/controller/RandomNumberControllerTest.java\``,
              ``,
              '```java',
              `package com.example.msrandomnumber.controller;`,
              ``,
              `import org.junit.jupiter.api.Test;`,
              `import org.springframework.beans.factory.annotation.Autowired;`,
              `import org.springframework.boot.test.autoconfigure.web.servlet.AutoConfigureMockMvc;`,
              `import org.springframework.boot.test.context.SpringBootTest;`,
              `import org.springframework.test.web.servlet.MockMvc;`,
              ``,
              `import static org.hamcrest.Matchers.allOf;`,
              `import static org.hamcrest.Matchers.greaterThanOrEqualTo;`,
              `import static org.hamcrest.Matchers.lessThanOrEqualTo;`,
              `import static org.springframework.test.web.servlet.request.MockMvcRequestBuilders.get;`,
              `import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.jsonPath;`,
              `import static org.springframework.test.web.servlet.result.MockMvcResultMatchers.status;`,
              ``,
              `@SpringBootTest`,
              `@AutoConfigureMockMvc`,
              `class RandomNumberControllerTest {`,
              ``,
              `    @Autowired`,
              `    private MockMvc mockMvc;`,
              ``,
              `    @Test`,
              `    void getRandom_shouldReturn200WithNumberBetween1And9() throws Exception {`,
              `        mockMvc.perform(get("/api/random"))`,
              `            .andExpect(status().isOk())`,
              `            .andExpect(jsonPath("$.number").exists())`,
              `            .andExpect(jsonPath("$.number").value(`,
              `                allOf(greaterThanOrEqualTo(1), lessThanOrEqualTo(9))`,
              `            ));`,
              `    }`,
              `}`,
              '```',
              ``,
              `---`,
              ``,
              `> 🤖 Generado automáticamente por el **testing-subagent** con skill \`java-testing-junit5\``,
            ].join('\n');

            // ─── Publicar comentario con el código generado ──────────────────────────
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: commentBody,
            });
            core.info(`Comentario publicado en el issue #${issueNumber}`);

            // ─── Agregar label "in-progress" ─────────────────────────────────────────
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: ['in-progress'],
            });
            core.info(`Label "in-progress" agregado al issue #${issueNumber}`);
