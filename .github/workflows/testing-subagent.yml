name: Testing Subagent — JUnit 5

# Skill: java-testing-junit5
# Handles sub-issues: [Tests]

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  testing-subagent:
    name: Testing Subagent - JUnit 5
    runs-on: ubuntu-latest
    if: |
      github.event.label.name == 'sub-issue' &&
      startsWith(github.event.issue.title, '[Tests]')

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Generar código de tests JUnit 5
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const issue = context.payload.issue;
            const issueNumber = issue.number;
            const issueTitle = issue.title;
            const { owner, repo } = context.repo;

            // ─── Asignar el issue a Copilot ──────────────────────────────────────────
            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number: issueNumber,
              assignees: ['Copilot'],
            });
            core.info(`Issue #${issueNumber} asignado a Copilot`);

            // ─── Leer SKILL.md y extraer el cuerpo (sin frontmatter YAML) ────────────
            const skillContent = fs.readFileSync('./.github/skills/java-testing-junit5/SKILL.md', 'utf8');
            const bodyMatch = skillContent.match(/^---[\s\S]*?---\n([\s\S]*)$/);
            const skillBody = bodyMatch ? bodyMatch[1].trim() : skillContent;

            // ─── Skill: java-testing-junit5 ──────────────────────────────────────────
            const commentBody = [
              `## 🧪 Testing Subagent — JUnit 5`,
              ``,
              `**Skill:** \`java-testing-junit5\` | **Tarea:** \`[Tests]\``,
              ``,
              `He analizado el issue y genero los tests unitarios y de integración. ✅`,
              ``,
              `---`,
              ``,
              skillBody,
              ``,
              `> 🤖 Generado automáticamente por el **testing-subagent** con skill \`java-testing-junit5\``,
            ].join('\n');

            // ─── Publicar comentario con el código generado ──────────────────────────
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: commentBody,
            });
            core.info(`Comentario publicado en el issue #${issueNumber}`);

            // ─── Agregar label "in-progress" ─────────────────────────────────────────
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: ['in-progress'],
            });
            core.info(`Label "in-progress" agregado al issue #${issueNumber}`);
