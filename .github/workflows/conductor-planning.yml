name: Conductor → Planning Subagent → Sub-Issues

on:
  issues:
    types: [assigned]

permissions:
  issues: write

jobs:
  invoke-planning-subagent:
    name: Planning Subagent - Generar Sub-Issues
    runs-on: ubuntu-latest
    if: |
      contains(
        fromJson('["copilot", "copilot[bot]", "github-copilot[bot]", "github-copilot", "Copilot"]'),
        github.event.assignee.login
      ) &&
      !contains(github.event.issue.labels.*.name, 'sub-issue')

    steps:
      - name: "Step 1 — Planning Subagent: Crear sub-issues (sin asignar)"
        id: planning
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const parentNumber = issue.number;
            const issueTitle = issue.title;
            const issueBody = issue.body || 'Sin descripción';
            const { owner, repo } = context.repo;

            // ─── Referencia al issue padre para incluir contexto en cada sub-issue ──
            const parentRef = [
              `**Issue padre:** #${parentNumber} — ${issueTitle}`,
              ``,
              `**Descripción:**`,
              issueBody,
            ].join('\n');

            // ─── Definición de sub-issues por el planning-subagent ───────────────────
            // dev: true  → el conductor lo asignará a Copilot (@dev-subagent)
            // dev: false → solo se crea, no se aborda
            const subIssues = [
              {
                title: `[Setup] Estructura inicial y configuración del proyecto`,
                dev: true,
                body: [
                  `## 🏗️ Actividad: Setup del Proyecto`,
                  ``,
                  parentRef,
                  ``,
                  `### Tareas`,
                  `- [ ] Crear la estructura base del proyecto con las dependencias necesarias`,
                  `- [ ] Configurar el gestor de dependencias (pom.xml, build.gradle, package.json, etc.)`,
                  `- [ ] Verificar que el proyecto compila y levanta correctamente`,
                  ``,
                  `---`,
                  `> Generado automáticamente por el **planning-subagent** 🤖`,
                ].join('\n'),
              },
              {
                title: `[Service] Implementar la lógica de negocio principal`,
                dev: true,
                body: [
                  `## ⚙️ Actividad: Servicio de Negocio`,
                  ``,
                  parentRef,
                  ``,
                  `### Tareas`,
                  `- [ ] Definir la interfaz o contrato del servicio`,
                  `- [ ] Implementar la lógica de negocio principal`,
                  `- [ ] Registrar el servicio en el contenedor de inyección de dependencias`,
                  ``,
                  `---`,
                  `> Generado automáticamente por el **planning-subagent** 🤖`,
                ].join('\n'),
              },
              {
                title: `[Controller] Exponer el endpoint o interfaz de entrada`,
                dev: true,
                body: [
                  `## 🌐 Actividad: Controlador / Punto de Entrada`,
                  ``,
                  parentRef,
                  ``,
                  `### Tareas`,
                  `- [ ] Crear el controlador o manejador de solicitudes`,
                  `- [ ] Exponer el endpoint o interfaz definida en el requerimiento`,
                  `- [ ] Inyectar el servicio de negocio y delegar la lógica`,
                  ``,
                  `---`,
                  `> Generado automáticamente por el **planning-subagent** 🤖`,
                ].join('\n'),
              },
              {
                title: `[Tests] Agregar tests unitarios y de integración`,
                dev: false,
                body: [
                  `## 🧪 Actividad: Testing`,
                  ``,
                  parentRef,
                  ``,
                  `### Tareas`,
                  `- [ ] Crear tests unitarios para la lógica de negocio`,
                  `- [ ] Crear tests de integración para el punto de entrada`,
                  `- [ ] Validar casos exitosos y casos de error`,
                  ``,
                  `---`,
                  `> Generado automáticamente por el **planning-subagent** 🤖`,
                ].join('\n'),
              },
              {
                title: `[Docs] Documentar uso y pruebas manuales`,
                dev: false,
                body: [
                  `## 📄 Actividad: Documentación`,
                  ``,
                  parentRef,
                  ``,
                  `### Tareas`,
                  `- [ ] Actualizar \`README.md\` con instrucciones de instalación y ejecución`,
                  `- [ ] Documentar el endpoint o interfaz con ejemplos de uso`,
                  `- [ ] Verificar el comportamiento manualmente y registrar el resultado esperado`,
                  ``,
                  `---`,
                  `> Generado automáticamente por el **planning-subagent** 🤖`,
                ].join('\n'),
              },
            ];

            // ─── Crear cada sub-issue y enlazarlo al padre (sin asignar) ─────────────
            const createdIssues = [];
            for (const subIssue of subIssues) {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title: subIssue.title,
                body: subIssue.body,
                labels: ['sub-issue'],
              });
              createdIssues.push({ number: created.data.number, title: subIssue.title, dev: subIssue.dev });
              core.info(`Sub-issue creado: #${created.data.number} — ${subIssue.title}`);

              // ─── Relación padre-hijo nativa ───────────────────────────────────────
              try {
                await github.request('POST /repos/{owner}/{repo}/issues/{issue_number}/sub_issues', {
                  owner,
                  repo,
                  issue_number: parentNumber,
                  sub_issue_id: created.data.id,
                });
                core.info(`Relación padre-hijo establecida: #${parentNumber} → #${created.data.number}`);
              } catch (err) {
                core.warning(`No se pudo establecer la relación padre-hijo para #${created.data.number}: ${err.message}`);
              }
            }

            // ─── Pasar números de sub-issues de dev al siguiente step ────────────────
            const devNumbers = createdIssues.filter(i => i.dev === true).map(i => i.number);
            core.setOutput('dev_issue_numbers', JSON.stringify(devNumbers));
            core.setOutput('created_issues', JSON.stringify(createdIssues));
            core.info(`Sub-issues de dev para asignar: ${devNumbers.join(', ')}`);

      - name: "Step 2 — Conductor: Asignar sub-issues de dev a Copilot"
        uses: actions/github-script@v7
        env:
          DEV_ISSUE_NUMBERS: ${{ steps.planning.outputs.dev_issue_numbers }}
          CREATED_ISSUES: ${{ steps.planning.outputs.created_issues }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const parentNumber = context.payload.issue.number;

            const devNumbers = JSON.parse(process.env.DEV_ISSUE_NUMBERS || '[]');
            const createdIssues = JSON.parse(process.env.CREATED_ISSUES || '[]');

            // ─── Asignar a Copilot solo los sub-issues de desarrollo ──────────────
            for (const issueNumber of devNumbers) {
              try {
                await github.rest.issues.addAssignees({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  assignees: ['copilot'],
                });
                core.info(`Sub-issue #${issueNumber} asignado a Copilot (@dev-subagent)`);
              } catch (err) {
                core.error(`ERROR al asignar Copilot al sub-issue #${issueNumber}: ${err.message}`);
                core.error(`Status: ${err.status ?? 'N/A'} | Response: ${JSON.stringify(err.response?.data || {})}`);
                core.setFailed(`No se pudo asignar Copilot al sub-issue #${issueNumber}: ${err.message}`);
              }
            }

            // ─── Comentario resumen en el issue padre ─────────────────────────────
            const devIssues = createdIssues.filter(i => i.dev);
            const pendingIssues = createdIssues.filter(i => !i.dev);

            const devList = devIssues.map(i => `- #${i.number} — ${i.title} ✅ asignado a @dev-subagent`).join('\n');
            const pendingList = pendingIssues.map(i => `- #${i.number} — ${i.title} ⏸️ pendiente (fuera de scope)`).join('\n');

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: parentNumber,
              body: [
                `## 🗺️ Planning Subagent — Roadmap de Actividades`,
                ``,
                `El **@planning-subagent** ha analizado el issue y creado los sub-issues.`,
                `El **@conductor** ha asignado los sub-issues de desarrollo al **@dev-subagent**.`,
                ``,
                `### ☕ Sub-issues de Desarrollo (asignadas a @dev-subagent)`,
                devList,
                ``,
                `### ⏸️ Sub-issues fuera de scope (no abordadas)`,
                pendingList,
                ``,
                `> Cada sub-issue de desarrollo será implementada por el **@dev-subagent** usando el skill \`java-springboot\`.`,
              ].join('\n'),
            });
