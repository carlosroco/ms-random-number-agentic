name: Dev Subagent — Java Spring Boot

# Skill: java-springboot
# Handles sub-issues: [Setup], [Service], [Controller]
# Triggered when a dev sub-issue is assigned to Copilot by the conductor

on:
  issues:
    types: [assigned]

permissions:
  issues: write

jobs:
  dev-subagent-springboot:
    name: Dev Subagent - Java Spring Boot
    runs-on: ubuntu-latest
    if: |
      contains(
        fromJson('["copilot", "copilot[bot]", "github-copilot[bot]", "github-copilot", "Copilot"]'),
        github.event.assignee.login
      ) &&
      (
        startsWith(github.event.issue.title, '[Setup]') ||
        startsWith(github.event.issue.title, '[Service]') ||
        startsWith(github.event.issue.title, '[Controller]')
      )

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Asignar sub-issue de desarrollo al @dev-subagent (Copilot)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const issue = context.payload.issue;
            const issueNumber = issue.number;
            const issueTitle = issue.title;
            const { owner, repo } = context.repo;

            // ─── Leer SKILL.md de java-springboot ────────────────────────────────────
            const skillContent = fs.readFileSync('./.github/skills/java-springboot/SKILL.md', 'utf8');
            const bodyMatch = skillContent.match(/^---[\s\S]*?---\n([\s\S]*)$/);
            const skillBody = bodyMatch ? bodyMatch[1].trim() : skillContent;

            // ─── Extraer la sección correspondiente al tipo de tarea ─────────────────
            let taskName = '';
            let taskPrefix = '';
            if (issueTitle.startsWith('[Setup]'))      { taskName = 'Setup';      taskPrefix = '[Setup]'; }
            else if (issueTitle.startsWith('[Service]'))    { taskName = 'Service';    taskPrefix = '[Service]'; }
            else if (issueTitle.startsWith('[Controller]')) { taskName = 'Controller'; taskPrefix = '[Controller]'; }

            let commentBody = skillBody;
            if (taskName) {
              const sectionRegex = new RegExp(`(## \\[${taskName}\\][\\s\\S]*?)(?=\\n## \\[|\\n*$)`);
              const sectionMatch = skillBody.match(sectionRegex);
              if (sectionMatch) commentBody = sectionMatch[1].trim();
            }

            commentBody = [
              `## ☕ @dev-subagent — Java Spring Boot`,
              ``,
              `**Skill:** \`java-springboot\` | **Tarea:** \`${taskPrefix || issueTitle}\``,
              ``,
              `El **@dev-subagent** ha recibido este sub-issue de desarrollo delegado por el **@conductor**.`,
              `Implementando con el skill \`java-springboot\`...`,
              ``,
              commentBody,
              ``,
              `> 🤖 Sub-issue asignado y en ejecución por el **@dev-subagent** con skill \`java-springboot\``,
            ].join('\n');

            // ─── Publicar comentario con el contexto del skill ────────────────────────
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: commentBody,
            });
            core.info(`Comentario publicado en el sub-issue #${issueNumber}`);

            // ─── Agregar label "in-progress" ──────────────────────────────────────────
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: ['in-progress'],
            });
            core.info(`Label "in-progress" agregado al sub-issue #${issueNumber}`);
