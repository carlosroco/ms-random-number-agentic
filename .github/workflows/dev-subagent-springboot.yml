name: Dev Subagent — Java Spring Boot

# Skill: java-springboot
# Handles sub-issues: [Setup], [Service], [Controller]

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  dev-subagent-springboot:
    name: Dev Subagent - Java Spring Boot
    runs-on: ubuntu-latest
    if: |
      github.event.label.name == 'sub-issue' &&
      (
        startsWith(github.event.issue.title, '[Setup]') ||
        startsWith(github.event.issue.title, '[Service]') ||
        startsWith(github.event.issue.title, '[Controller]')
      )

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Generar código Java Spring Boot
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const skill = require('./.github/skills/java-springboot.skill.js');
            const issue = context.payload.issue;
            const issueNumber = issue.number;
            const issueTitle = issue.title;
            const { owner, repo } = context.repo;

            // ─── Asignar el issue a Copilot ──────────────────────────────────────────
            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number: issueNumber,
              assignees: ['Copilot'],
            });
            core.info(`Issue #${issueNumber} asignado a Copilot`);

            // ─── Detectar el tipo de tarea por prefijo del título ────────────────────
            let commentBody = '';

            if (issueTitle.startsWith('[Setup]')) {
              commentBody = skill.setup(issueTitle);
            } else if (issueTitle.startsWith('[Service]')) {
              commentBody = skill.service(issueTitle);
            } else if (issueTitle.startsWith('[Controller]')) {
              commentBody = skill.controller(issueTitle);
            }

            // ─── Publicar comentario con el código generado ──────────────────────────
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: commentBody,
            });
            core.info(`Comentario publicado en el issue #${issueNumber}`);

            // ─── Agregar label "in-progress" ─────────────────────────────────────────
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: ['in-progress'],
            });
            core.info(`Label "in-progress" agregado al issue #${issueNumber}`);
