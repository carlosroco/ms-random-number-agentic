name: Dev Subagent — Java Spring Boot

# Skill: java-springboot
# Handles sub-issues: [Setup], [Service], [Controller]

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  dev-subagent-springboot:
    name: Dev Subagent - Java Spring Boot
    runs-on: ubuntu-latest
    if: |
      github.event.label.name == 'sub-issue' &&
      (
        startsWith(github.event.issue.title, '[Setup]') ||
        startsWith(github.event.issue.title, '[Service]') ||
        startsWith(github.event.issue.title, '[Controller]')
      )

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Generar código Java Spring Boot
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');

            const issue = context.payload.issue;
            const issueNumber = issue.number;
            const issueTitle = issue.title;
            const { owner, repo } = context.repo;

            // ─── Asignar el issue a Copilot ──────────────────────────────────────────
            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number: issueNumber,
              assignees: ['Copilot'],
            });
            core.info(`Issue #${issueNumber} asignado a Copilot`);

            // ─── Leer SKILL.md y extraer la sección correspondiente ──────────────────
            const skillContent = fs.readFileSync('./.github/skills/java-springboot/SKILL.md', 'utf8');
            // Strip YAML frontmatter (content between first two '---' lines)
            const bodyMatch = skillContent.match(/^---[\s\S]*?---\n([\s\S]*)$/);
            const skillBody = bodyMatch ? bodyMatch[1].trim() : skillContent;

            // Detect task type and extract matching section (## [Setup], ## [Service], ## [Controller])
            let taskName = '';
            let taskPrefix = '';
            if (issueTitle.startsWith('[Setup]')) { taskName = 'Setup'; taskPrefix = '[Setup]'; }
            else if (issueTitle.startsWith('[Service]')) { taskName = 'Service'; taskPrefix = '[Service]'; }
            else if (issueTitle.startsWith('[Controller]')) { taskName = 'Controller'; taskPrefix = '[Controller]'; }

            let commentBody = '';
            if (taskName) {
              const sectionRegex = new RegExp(`(## \\[${taskName}\\][\\s\\S]*?)(?=\\n## \\[|\\n*$)`);
              const sectionMatch = skillBody.match(sectionRegex);
              commentBody = sectionMatch ? sectionMatch[1].trim() : skillBody;
            } else {
              commentBody = skillBody;
            }

            commentBody = [
              `## ☕ Dev Subagent — Java Spring Boot`,
              ``,
              `**Skill:** \`java-springboot\` | **Tarea:** \`${taskPrefix || issueTitle}\``,
              ``,
              commentBody,
              ``,
              `> 🤖 Generado automáticamente por el **dev-subagent** con skill \`java-springboot\``,
            ].join('\n');

            // ─── Publicar comentario con el código generado ──────────────────────────
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: commentBody,
            });
            core.info(`Comentario publicado en el issue #${issueNumber}`);

            // ─── Agregar label "in-progress" ─────────────────────────────────────────
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: ['in-progress'],
            });
            core.info(`Label "in-progress" agregado al issue #${issueNumber}`);
