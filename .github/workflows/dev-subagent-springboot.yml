name: Dev Subagent — Java Spring Boot

# Skill: java-springboot
# Handles sub-issues: [Setup], [Service], [Controller]

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  dev-subagent-springboot:
    name: Dev Subagent - Java Spring Boot
    runs-on: ubuntu-latest
    if: |
      github.event.label.name == 'sub-issue' &&
      (
        startsWith(github.event.issue.title, '[Setup]') ||
        startsWith(github.event.issue.title, '[Service]') ||
        startsWith(github.event.issue.title, '[Controller]')
      )

    steps:
      - name: Generar código Java Spring Boot
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const issueNumber = issue.number;
            const issueTitle = issue.title;
            const { owner, repo } = context.repo;

            // ─── Asignar el issue a Copilot ──────────────────────────────────────────
            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number: issueNumber,
              assignees: ['Copilot'],
            });
            core.info(`Issue #${issueNumber} asignado a Copilot`);

            // ─── Detectar el tipo de tarea por prefijo del título ────────────────────
            let commentBody = '';

            if (issueTitle.startsWith('[Setup]')) {
              // ── Skill: Spring Boot Setup ───────────────────────────────────────────
              commentBody = [
                `## ☕ Dev Subagent — Java Spring Boot`,
                ``,
                `**Skill:** \`java-springboot\` | **Tarea:** \`[Setup]\``,
                ``,
                `He analizado el issue y genero la estructura inicial del proyecto Spring Boot. 🏗️`,
                ``,
                `---`,
                ``,
                `### 📄 \`pom.xml\``,
                ``,
                '```xml',
                `<?xml version="1.0" encoding="UTF-8"?>`,
                `<project xmlns="http://maven.apache.org/POM/4.0.0"`,
                `         xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"`,
                `         xsi:schemaLocation="http://maven.apache.org/POM/4.0.0`,
                `         https://maven.apache.org/xsd/maven-4.0.0.xsd">`,
                `  <modelVersion>4.0.0</modelVersion>`,
                ``,
                `  <parent>`,
                `    <groupId>org.springframework.boot</groupId>`,
                `    <artifactId>spring-boot-starter-parent</artifactId>`,
                `    <version>3.2.0</version>`,
                `    <relativePath/>`,
                `  </parent>`,
                ``,
                `  <groupId>com.example</groupId>`,
                `  <artifactId>ms-random-number</artifactId>`,
                `  <version>0.0.1-SNAPSHOT</version>`,
                `  <name>ms-random-number</name>`,
                `  <description>Microservicio que retorna un número aleatorio del 1 al 9</description>`,
                ``,
                `  <properties>`,
                `    <java.version>17</java.version>`,
                `  </properties>`,
                ``,
                `  <dependencies>`,
                `    <dependency>`,
                `      <groupId>org.springframework.boot</groupId>`,
                `      <artifactId>spring-boot-starter-web</artifactId>`,
                `    </dependency>`,
                ``,
                `    <dependency>`,
                `      <groupId>org.springframework.boot</groupId>`,
                `      <artifactId>spring-boot-starter-test</artifactId>`,
                `      <scope>test</scope>`,
                `    </dependency>`,
                `  </dependencies>`,
                ``,
                `  <build>`,
                `    <plugins>`,
                `      <plugin>`,
                `        <groupId>org.springframework.boot</groupId>`,
                `        <artifactId>spring-boot-maven-plugin</artifactId>`,
                `      </plugin>`,
                `    </plugins>`,
                `  </build>`,
                `</project>`,
                '```',
                ``,
                `---`,
                ``,
                `### 📄 \`src/main/java/com/example/msrandomnumber/MsRandomNumberApplication.java\``,
                ``,
                '```java',
                `package com.example.msrandomnumber;`,
                ``,
                `import org.springframework.boot.SpringApplication;`,
                `import org.springframework.boot.autoconfigure.SpringBootApplication;`,
                ``,
                `@SpringBootApplication`,
                `public class MsRandomNumberApplication {`,
                ``,
                `    public static void main(String[] args) {`,
                `        SpringApplication.run(MsRandomNumberApplication.class, args);`,
                `    }`,
                `}`,
                '```',
                ``,
                `---`,
                ``,
                `> 🤖 Generado automáticamente por el **dev-subagent** con skill \`java-springboot\``,
              ].join('\n');

            } else if (issueTitle.startsWith('[Service]')) {
              // ── Skill: Spring Service Pattern ──────────────────────────────────────
              commentBody = [
                `## ☕ Dev Subagent — Java Spring Boot`,
                ``,
                `**Skill:** \`java-springboot\` | **Tarea:** \`[Service]\``,
                ``,
                `He analizado el issue y genero la capa de servicio del microservicio. ⚙️`,
                ``,
                `---`,
                ``,
                `### 📄 \`src/main/java/com/example/msrandomnumber/service/RandomNumberService.java\``,
                ``,
                '```java',
                `package com.example.msrandomnumber.service;`,
                ``,
                `public interface RandomNumberService {`,
                ``,
                `    int getRandomNumber();`,
                `}`,
                '```',
                ``,
                `---`,
                ``,
                `### 📄 \`src/main/java/com/example/msrandomnumber/service/RandomNumberServiceImpl.java\``,
                ``,
                '```java',
                `package com.example.msrandomnumber.service;`,
                ``,
                `import org.springframework.stereotype.Service;`,
                `import java.util.concurrent.ThreadLocalRandom;`,
                ``,
                `@Service`,
                `public class RandomNumberServiceImpl implements RandomNumberService {`,
                ``,
                `    @Override`,
                `    public int getRandomNumber() {`,
                `        return ThreadLocalRandom.current().nextInt(1, 10);`,
                `    }`,
                `}`,
                '```',
                ``,
                `---`,
                ``,
                `> 🤖 Generado automáticamente por el **dev-subagent** con skill \`java-springboot\``,
              ].join('\n');

            } else if (issueTitle.startsWith('[Controller]')) {
              // ── Skill: Spring REST Controller ──────────────────────────────────────
              commentBody = [
                `## ☕ Dev Subagent — Java Spring Boot`,
                ``,
                `**Skill:** \`java-springboot\` | **Tarea:** \`[Controller]\``,
                ``,
                `He analizado el issue y genero el controlador REST del microservicio. 🌐`,
                ``,
                `---`,
                ``,
                `### 📄 \`src/main/java/com/example/msrandomnumber/controller/RandomNumberController.java\``,
                ``,
                '```java',
                `package com.example.msrandomnumber.controller;`,
                ``,
                `import com.example.msrandomnumber.service.RandomNumberService;`,
                `import org.springframework.http.ResponseEntity;`,
                `import org.springframework.web.bind.annotation.GetMapping;`,
                `import org.springframework.web.bind.annotation.RequestMapping;`,
                `import org.springframework.web.bind.annotation.RestController;`,
                ``,
                `import java.util.Map;`,
                ``,
                `@RestController`,
                `@RequestMapping("/api")`,
                `public class RandomNumberController {`,
                ``,
                `    private final RandomNumberService randomNumberService;`,
                ``,
                `    public RandomNumberController(RandomNumberService randomNumberService) {`,
                `        this.randomNumberService = randomNumberService;`,
                `    }`,
                ``,
                `    @GetMapping("/random")`,
                `    public ResponseEntity<Map<String, Integer>> getRandom() {`,
                `        int number = randomNumberService.getRandomNumber();`,
                `        return ResponseEntity.ok(Map.of("number", number));`,
                `    }`,
                `}`,
                '```',
                ``,
                `---`,
                ``,
                `> 🤖 Generado automáticamente por el **dev-subagent** con skill \`java-springboot\``,
              ].join('\n');
            }

            // ─── Publicar comentario con el código generado ──────────────────────────
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: issueNumber,
              body: commentBody,
            });
            core.info(`Comentario publicado en el issue #${issueNumber}`);

            // ─── Agregar label "in-progress" ─────────────────────────────────────────
            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: issueNumber,
              labels: ['in-progress'],
            });
            core.info(`Label "in-progress" agregado al issue #${issueNumber}`);
